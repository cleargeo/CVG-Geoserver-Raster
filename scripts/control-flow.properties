# =============================================================================
# CVG GeoServer Raster — GeoServer Request Control Flow Configuration
# (c) Clearview Geographic, LLC — Proprietary
# =============================================================================
# INSTALLATION:
#   Copy this file to the GeoServer data_dir on the production VM:
#     docker cp scripts/control-flow.properties geoserver-raster:/opt/geoserver/data_dir/
#   OR mount as a Docker volume in docker-compose.prod.yml:
#     - ./scripts/control-flow.properties:/opt/geoserver/data_dir/control-flow.properties:ro
#
# REFERENCE:
#   https://docs.geoserver.org/stable/en/user/extensions/controlflow/index.html
#   Requires the control-flow extension plugin (install from GeoServer extensions).
#
# PURPOSE:
#   Prevents GeoServer from being overwhelmed by:
#     - Too many simultaneous raster tile requests
#     - Large WCS GetCoverage downloads blocking other requests
#     - Single-client bulk scraping / tile seeding floods
# =============================================================================

# ── Global Request Limits ─────────────────────────────────────────────────────

# Maximum total concurrent OGC requests across all services.
# VM454 has 8 vCPUs; raster rendering is CPU-bound.
# Allow up to 32 concurrent requests (4x vCPU count).
ows.global=32

# Maximum time (seconds) a request waits in the queue before being rejected.
# WCS GetCoverage can be slow but should not queue indefinitely.
timeout=120

# ── Per-Service Limits ────────────────────────────────────────────────────────

# WMS GetMap — max parallel tile render threads.
# ImageMosaic rendering is memory-intensive; limit to avoid heap exhaustion.
# Set to 2x vCPU for typical WMS map rendering workloads.
ows.wms.getmap=16

# WMS GetFeatureInfo — fast PostGIS query; allow more concurrency
ows.wms.getfeatureinfo=8

# WMS GetCapabilities — cached XML generation; allow reasonable concurrency
ows.wms.getcapabilities=4

# WCS GetCoverage — high memory: reading + resampling + encoding large rasters.
# Limit to prevent OOM on large coverage downloads.
ows.wcs.getcoverage=4

# WCS GetCapabilities — lightweight
ows.wcs.getcapabilities=4

# ── Per-User / Per-IP Limits ──────────────────────────────────────────────────

# Maximum concurrent requests per user (anonymous users tracked by IP).
# Prevents a single client from monopolizing all render threads.
user=6

# ── High-Timeout Requests (WCS downloads) ────────────────────────────────────

# WCS GetCoverage requests time out after 300s (5 minutes) if no data sent.
# This matches the Caddyfile read_timeout setting.
ows.wcs.getcoverage.timeout=300

# ── Notes ─────────────────────────────────────────────────────────────────────
# After installing the control-flow.properties, restart GeoServer to apply:
#   docker compose -f docker-compose.prod.yml restart geoserver-raster
#
# Monitor request queue depth via the GeoServer Admin UI:
#   Admin UI → About & Status → System Status → GeoServer → Monitoring
#
# If you experience "max requests exceeded" errors, increase the limits
# proportional to available RAM and CPU cores.
